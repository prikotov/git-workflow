name: Secret Scan PR Content

# Сканирует PR-body, PR-title и PR-comments на секреты через gitleaks.
#
# Gap, не покрываемый pre-commit gitleaks и GitHub Push Protection: они работают
# только на git-контент (staged diff, git-push). PR-body/comments живут в GitHub
# API вне git — этот workflow сканирует их до merge.
#
# Управляется пакетом prikotov/git-workflow. Обновление:
#   composer update prikotov/git-workflow && php vendor/bin/git-workflow-init --force
#
# Срабатывает на: открытие/редактирование PR + новые/отредактированные comments.

on:
  pull_request:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  scan-pr-content:
    # Только для PR-событий (issue_comment/pr_review_comment срабатывают и на issue,
    # но нас интересуют только связанные с PR).
    if: github.event_name == 'pull_request' || github.event.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (для .gitleaks.toml)
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p')
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      # ВАЖНО: контент PR (title/body/comments) собирается через `gh api --jq` и
      # пишется в файл. Он НИКОГДА не интерполируется в shell-команду через
      # ${{ ... }} — иначе markdown/backticks/кавычки в body ломают шаг (script
      # injection / обрыв echo). Контент идёт: gh api → stdout → файл.
      - name: Collect PR content (title, body, comments) via gh api
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p scan
          {
            echo "# PR title"
            echo ""
            gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.title'
            echo ""
            echo "# PR body"
            echo ""
            gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""'
            echo ""
            echo "# PR comments"
            echo ""
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --jq '.[].body' 2>/dev/null || true
            echo ""
            echo "# PR review comments"
            echo ""
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" --jq '.[].body' 2>/dev/null || true
          } > scan/pr-meta.txt

      - name: Run gitleaks on PR content
        id: scan
        run: |
          set -euo pipefail
          # --no-git: файл как plain text. --redact: не печатать секрет в логе.
          # Конфиг: .gitleaks.toml проекта, если есть; иначе встроенные rules gitleaks.
          CONFIG=()
          if [ -f .gitleaks.toml ]; then
            CONFIG=(--config .gitleaks.toml)
          fi
          if gitleaks detect --no-banner --no-git --redact "${CONFIG[@]}" --source scan/pr-meta.txt > finding.log 2>&1; then
            echo "secret-found=false" >> "$GITHUB_OUTPUT"
            echo "✅ No secrets in PR content"
          else
            ec=$?
            if [ "$ec" -eq 1 ]; then
              echo "secret-found=true" >> "$GITHUB_OUTPUT"
              echo "🔴 Secret detected in PR content (redacted):"
              cat finding.log
              exit 1
            else
              echo "secret-found=scanner-error" >> "$GITHUB_OUTPUT"
              echo "⚠️ gitleaks scanner error (exit $ec):"
              cat finding.log
              exit "$ec"
            fi
          fi

      - name: Comment on PR if secret found
        if: failure() && steps.scan.outputs.secret-found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUMBER" --body "🔴 **Secret Scan PR Content**: обнаружен секрет в PR-body/title/comment. GitHub Push Protection не покрывает API-редактирование PR, поэтому этот CI ловит gap. Уберите секрет (используйте \`<REDACTED>\`), перевыпустите при необходимости и обновите PR. [Лог CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) — секреты в логе redacted."
